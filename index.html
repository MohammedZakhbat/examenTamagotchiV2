<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./input.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Tamagotchi Pro</title>

</head>



<body
    class="min-h-screen bg-gradient-to-br from-purple-900 via-black to-indigo-900 flex items-center justify-center p-6">




    <div id="selectScreen"
        class="w-full max-w-4xl bg-white/10 backdrop-blur-xl rounded-3xl p-10 text-center shadow-2xl">


        <h1 class="text-6xl font-black text-white mb-10">
            🐣 Tamagotchi Pro
        </h1>



        <div class="flex items-center justify-center gap-10">


            <button onclick="previousPlayer()" class="arrow">
                ⬅️
            </button>



            <div>

                <img id="playerImg" class="w-60 mx-auto">


                <h2 id="playerName" class="text-4xl text-white font-bold mt-5">
                </h2>


            </div>




            <button onclick="nextPlayer()" class="arrow">
                ➡️
            </button>



        </div>



        <button onclick="startGame()"
            class="mt-10 bg-green-500 hover:bg-green-600 text-white font-bold px-10 py-4 rounded-2xl text-xl">

            🎮 Jouer

        </button>



    </div>





    <div id="gameScreen" class="hidden w-full max-w-6xl bg-white rounded-[40px] overflow-hidden shadow-2xl">



        <div class="grid lg:grid-cols-2 gap-10 p-10">


            <div class="flex items-center justify-center">


                <img id="petGameImg" class="w-72 drop-shadow-2xl">


            </div>





            <div>


                <h1 id="gameName" class="text-5xl font-black mb-8">
                </h1>





                <div class="space-y-6">


                    <div>

                        <div class="flex justify-between text-xl font-bold text-red-600">

                            <span>
                                ❤️ Salud
                            </span>

                            <span id="saludText">
                                0
                            </span>

                        </div>


                        <div class="bar">

                            <div id="saludBar" class="bg-red-500 h-full">
                            </div>

                        </div>


                    </div>





                    <div>


                        <div class="flex justify-between text-xl font-bold text-yellow-500">

                            <span>
                                😊 Felicidad
                            </span>


                            <span id="felicidadText">
                                0
                            </span>

                        </div>


                        <div class="bar">

                            <div id="felicidadBar" class="bg-yellow-400 h-full">
                            </div>

                        </div>


                    </div>




                    <div>


                        <div class="flex justify-between text-xl font-bold text-cyan-600">


                            <span>
                                🧼 Limpieza
                            </span>


                            <span id="limpiezaText">
                                0
                            </span>


                        </div>



                        <div class="bar">

                            <div id="limpiezaBar" class="bg-cyan-500 h-full">
                            </div>

                        </div>



                    </div>







                    <div>


                        <div class="flex justify-between text-xl font-bold text-green-600">


                            <span>
                                ⚡ Energía
                            </span>


                            <span id="energiaText">
                                0
                            </span>


                        </div>


                        <div class="bar">

                            <div id="energiaBar" class="bg-green-500 h-full">
                            </div>


                        </div>


                    </div>





                </div>



                <h2 id="message" class="mt-8 text-2xl font-bold">
                </h2>


            </div>


        </div>






        <div class="bg-gray-100 p-8 grid grid-cols-2 md:grid-cols-3 gap-5">



            <button id="alimentar" class="btn">
                🍎 Alimentar
            </button>


            <button id="jugar" class="btn">
                🤡 Jugar
            </button>


            <button id="dormir" class="btn">
                😴 Dormir
            </button>


            <button id="duchar" class="btn">
                🚿 Duchar
            </button>


            <button id="reprender" class="btn">
                😡 Reprender
            </button>


            <button id="acariciar" class="btn">
                🥰 Acariciar
            </button>


        </div>



    </div>



    <div id="gameOverScreen" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center">


        <div class="text-center">


            <h1 class="text-7xl text-red-500 font-black">
                GAME OVER 💀
            </h1>


            <p class="text-white text-xl mt-5">
                El Tamagotchi ha muerto
            </p>



            <button onclick="restartGame()"
                class="mt-8 bg-red-500 hover:bg-red-600 text-white px-10 py-4 rounded-2xl font-bold">


                🔄 Rejouer


            </button>


        </div>


    </div>




    <script src="app.js"></script>


</body>

</html>
